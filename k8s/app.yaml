apiVersion: apps/v1
kind: Deployment
metadata:
  name: namegen

spec:
  replicas: 2

  selector:
    matchLabels:
      app: namegen

  template:
    metadata:
      labels:
        app: namegen

    spec:
      containers:
      - name: namegen

        image: 574441343585.dkr.ecr.eu-central-1.amazonaws.com/namegen:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        env:
        - name: MONGODB_URL
          value: mongodb://mongodb:27017/namegen

        - name: SERVER_PORT
          value: "8080"

---
apiVersion: v1
kind: Service
metadata:
  name: namegen-service

  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

spec:
  type: LoadBalancer

  selector:
    app: namegen

  ports:
  - port: 80
    targetPort: 8080