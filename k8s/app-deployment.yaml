apiVersion: apps/v1
kind: Deployment
metadata:
  name: namegen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: namegen
  template:
    metadata:
      labels:
        app: namegen
    spec:
      containers:
        - name: namegen
          image: 574441343585.dkr.ecr.eu-central-1.amazonaws.com/namegen
          ports:
            - containerPort: 8080
          env:
            - name: MONGODB_URL
              value: mongodb://genuser:password@mongodb/namegen